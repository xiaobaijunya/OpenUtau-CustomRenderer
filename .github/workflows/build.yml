on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        default: "0.0.0"
        required: true
        type: string
      release:
        type: boolean
        default: false
        description: "Release"
      beta:
        type: boolean
        default: true
        description: "Beta"
      draft:
        type: boolean
        default: true
        description: "Draft"

env:
  release-name: ${{ inputs.version }}${{ inputs.beta && ' Beta' || '' }}

jobs:
  build:
    runs-on: ${{ matrix.arch.runs-on }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: win-x64, rid: win-x64, arch: x64, os: win, runs-on: windows-latest }
          - { name: win-x86, rid: win-x86, arch: x86, os: win, runs-on: windows-latest }
          - { name: win-arm64, rid: win-arm64, arch: arm64, os: win, runs-on: windows-latest }
          - { name: osx-arm64, rid: osx-arm64, arch: arm64, os: osx, runs-on: macos-latest }
          - { name: linux-x64, rid: linux-x64, arch: x64, os: linux, runs-on: ubuntu-latest, linuxarch: x86_64}

    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: justalemon/VersionPatcher@v0.7.1
        with:
          version: ${{ inputs.version }}
          csproj-files: "OpenUtau/*.csproj"

      # Test
      - name: Test
        run: dotnet test OpenUtau.Test

      # Build
      - name: Restore
        run: dotnet restore OpenUtau -r ${{ matrix.arch.rid }}

      - name: Build (Windows and Linux)
        run: dotnet publish OpenUtau -c Release -r ${{ matrix.arch.rid }} --self-contained true -o bin/${{ matrix.arch.name }}/
        if: ${{ matrix.arch.os != 'osx' }}

      - name: Build (MacOS)
        run: dotnet msbuild OpenUtau -t:BundleApp -p:Configuration=Release -p:RuntimeIdentifier=${{ matrix.arch.rid }} -p:UseAppHost=true -p:SelfContained=true -p:OutputPath=../bin/${{ matrix.arch.name }}/
        if: ${{ matrix.arch.os == 'osx' }}
      
      - name: Write release channel info
        run: "@{Beta=$${{ inputs.beta }}} | ConvertTo-Json > bin/${{ matrix.arch.name }}/prefs-default.json"
        shell: pwsh

      # Create Zip
      - name: DirectML
        shell: cmd
        run: |
          curl -L https://www.nuget.org/api/v2/package/Microsoft.AI.DirectML/1.15.4 -o Microsoft.AI.DirectML.nupkg
          mkdir Microsoft.AI.DirectML
          tar -xf Microsoft.AI.DirectML.nupkg -C Microsoft.AI.DirectML
          copy /y Microsoft.AI.DirectML\bin\${{ matrix.arch.arch }}-${{ matrix.arch.os }}\DirectML.dll bin\${{ matrix.arch.name }}\
        if: ${{ matrix.arch.os == 'win' }}

      - name: Set executable permission
        run: chmod +x bin/${{ matrix.arch.name }}/OpenUtau
        if: ${{ matrix.arch.os == 'linux' }}

      # Download default voicebank
      - name: Download default voicebank (XiaoShuang)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin/${{ matrix.arch.name }}/Singers
          curl -L https://github.com/xiaobaijunya/OpenUtau-CustomRenderer/releases/download/0.0.0/XiaoShuang_zhcvv.zip -o XiaoShuang_zhcvv.zip
          Expand-Archive -Path XiaoShuang_zhcvv.zip -DestinationPath bin/${{ matrix.arch.name }}/Singers/ -Force
          Remove-Item XiaoShuang_zhcvv.zip

      # Upload Artifacts (non-release only, GitHub will zip the directory once)
      - uses: actions/upload-artifact@v4
        with:
          name: OpenUtau-${{ matrix.arch.name }}
          path: bin/${{ matrix.arch.name }}/
        if: ${{ !inputs.release }}

      # Appcast
      - name: Appcast Windows
        shell: cmd
        run: |
          python appcast.py -v=${{ inputs.version }} -o=windows -r=${{ matrix.arch.name }} -f=OpenUtau-${{ matrix.arch.name }}.zip
        if: ${{ inputs.release && matrix.arch.os == 'win' }}

      - name: Appcast macOS
        run: |
          python appcast.py -v=${{ inputs.version }} -o=macos -r=${{ matrix.arch.name }} -f=OpenUtau-${{ matrix.arch.name }}.zip
        if: ${{ inputs.release && matrix.arch.os == 'osx' }}

      - name: Appcast Linux
        run: |
          python appcast.py -v=${{ inputs.version }} -o=linux -r=${{ matrix.arch.name }} -f=OpenUtau-${{ matrix.arch.name }}.zip
        if: ${{ inputs.release && matrix.arch.os == 'linux' }}

      # Create Zip for Release
      - name: Create Zip (Windows)
        run: |
          cd bin/${{ matrix.arch.name }}
          7z a ../../OpenUtau-${{ matrix.arch.name }}.zip *
        if: ${{ inputs.release && matrix.arch.os == 'win' }}

      - name: Create Zip (Linux/macOS)
        run: |
          cd bin/${{ matrix.arch.name }}
          zip -r ../../OpenUtau-${{ matrix.arch.name }}.zip *
        if: ${{ inputs.release && matrix.arch.os != 'win' }}

      # Generate release changelog
      - name: Generate release changelog
        shell: pwsh
        run: |
          $currentVersion = "${{ inputs.version }}"
          $repo = "stakira/OpenUtau"

          # Find previous version tag
          $tags = git tag --list | Where-Object { $_ -match '^\d+\.\d+\.\d+$' } | Sort-Object -Descending
          $prevTag = $null
          foreach ($tag in $tags) {
            if ([version]$tag -lt [version]$currentVersion) {
              $prevTag = $tag
              break
            }
          }

          $bodyLines = [System.Collections.ArrayList]::new()

          if ($prevTag) {
            $log = git log "$($prevTag)..HEAD" --oneline --no-merges
            Write-Host "Found previous tag: $prevTag, commits count: $($log.Count)"
            [void]$bodyLines.Add("## 更新内容")
            [void]$bodyLines.Add("基于上个版本 \`$prevTag\` 的更新：")
            [void]$bodyLines.Add("")
            $i = 1
            foreach ($line in $log) {
              $parts = $line.Split(' ', 2)
              $hash = $parts[0]
              $msg = $parts[1]
              [void]$bodyLines.Add("$i. [$msg](https://github.com/$repo/commit/$hash)")
              $i++
            }
            [void]$bodyLines.Add("")
          }

          [void]$bodyLines.Add("See [Getting Started](https://github.com/$repo/wiki/Getting-Started) for how to use.")
          [void]$bodyLines.Add("")
          [void]$bodyLines.Add("If you encountered issues, see [FAQ](https://github.com/$repo/wiki/FAQ)")
          [void]$bodyLines.Add("")
          [void]$bodyLines.Add("## macOS says `"This app is damaged`"")
          [void]$bodyLines.Add("Open a terminal and run `xattr -rc /Applications/OpenUtau.app`. Try opening OpenUtau again.")

          $bodyLines -join "`n" | Out-File -FilePath release_body.md -Encoding utf8
          Write-Host "Release body written to release_body.md"

      # Release
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ env.release-name }}
          prerelease: ${{ inputs.beta }}
          draft: ${{ inputs.draft }}
          body_path: release_body.md
          files: |
            appcast.${{ matrix.arch.name }}*.xml
            OpenUtau-${{ matrix.arch.name }}.zip
        if: ${{ inputs.release }}
